<html lang="fr">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      content="Steam PatchVault: timeline de patch notes, manifests et commandes Steam Console prêtes à copier."
    />
    <title>Steam PatchVault</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
