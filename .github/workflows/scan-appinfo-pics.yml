name: Scan Steam AppInfo PICS
run-name: Scan appinfo/PICS · ${{ github.event.inputs.appid || 'priority-batch' }}

on:
  workflow_dispatch:
    inputs:
      appid:
        description: "Steam AppID to scan, optional (single or comma-separated)"
        required: false
        default: ""
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: scan-appinfo-${{ github.event.inputs.appid || 'priority-batch' }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build community manifest index (GitHub Trees)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-community-manifest-index.mjs

      - name: Scan appinfo/PICS
        env:
          INPUT_APPID: ${{ github.event.inputs.appid }}
        run: python scripts/scan_appinfo_pics.py --appid "${INPUT_APPID}"

      - name: Build depot/app indexes
        run: python scripts/build_depot_to_app_index.py

      - name: Merge community manifests with depot mapping
        run: python scripts/merge_github_manifests_with_depots.py

      - name: Sensitive data guard
        run: python scripts/scan_sensitive_data.py

      - name: Commit and push when data changed
        run: |
          if git diff --quiet -- data; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore(data): scan appinfo pics and refresh depot indexes"
          git push
