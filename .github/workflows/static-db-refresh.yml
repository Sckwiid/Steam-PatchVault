name: Refresh Static Steam Database

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-static-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static database
        env:
          STEAM_WEB_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}
          PATCHVAULT_MAX_APPS: "50000"
          PATCHVAULT_NEWS_COUNT: "12"
          PATCHVAULT_NEWS_MAXLENGTH: "2200"
          PATCHVAULT_NEWS_FEEDS: "steam_community_announcements"
        run: node scripts/build-static-db.mjs

      - name: Commit and push when data changed
        run: |
          if git diff --quiet -- data; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/search-index.json data/games data/patches data/manifests
          git commit -m "chore(data): refresh static steam database"
          git push
